{{!-- ZRPS Item Sheet --}}
<div class="zrps-tailwind flex flex-col gap-4 p-4 h-full">

  {{!-- Header: portrait + name + weight --}}
  <header class="flex flex-row gap-4 items-center">
    <img class="w-16 h-16 rounded object-cover cursor-pointer shrink-0"
         src="{{item.img}}" data-edit="img" title="{{item.name}}" />

    <div class="flex flex-col gap-2 flex-1 min-w-0">
      <input class="text-xl font-bold bg-transparent border-b border-gray-400 focus:outline-none w-full"
             type="text" name="name" value="{{item.name}}" placeholder="Item Name" />

      <div class="flex flex-row items-center gap-2">
        <span class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Weight</span>
        <input class="w-20 text-center border border-gray-300 rounded px-1 py-0.5 text-sm"
               type="number" name="system.weight" value="{{system.weight}}" step="0.1" min="0" />
        <span class="text-sm text-gray-400">kg</span>
      </div>
    </div>
  </header>

  {{!-- Divider --}}
  <hr class="border-gray-300" />

  {{!-- Description --}}
  <section class="flex flex-col gap-1 flex-1 min-h-0">
    <label class="text-xs font-bold uppercase tracking-widest text-gray-500">Description</label>
    <div class="flex-1 min-h-0 overflow-y-auto">
      {{editor system.description target="system.description" editable=editable engine="prosemirror" button=false}}
    </div>
  </section>

</div>
