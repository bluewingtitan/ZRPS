{{!-- ZRPS Actor Sheet --}}
<div class="zrps-tailwind flex flex-col gap-4 p-4 h-full">

  {{!-- Header: portrait + name + HP --}}
  <header class="flex flex-row gap-4 items-center">
    <img class="w-20 h-20 rounded object-cover cursor-pointer shrink-0"
         src="{{actor.img}}" data-edit="img" title="{{actor.name}}" />

    <div class="flex flex-col gap-2 flex-1 min-w-0">
      <input class="input text-xl w-full"
             type="text" name="name" value="{{actor.name}}" placeholder="Character Name" />

      <div class="flex flex-row items-center gap-2">
        <span class="text-sm font-semibold text-gray-500 uppercase tracking-wide w-6">HP</span>
        <input class="input w-14 text-center"
               type="number" name="system.hp.value" value="{{system.hp.value}}" />
        <span class="text-gray-400">/</span>
        <input class="input w-14 text-center"
               type="number" name="system.hp.max" value="{{system.hp.max}}" />
      </div>
    </div>
  </header>

  {{!-- Divider --}}
  <hr class="border-gray-300" />

  {{!-- Stats row: ST DX IQ HT --}}
  <section class="flex flex-row justify-around">
    {{#each stats as |stat|}}
    <div class="flex flex-col items-center gap-1">
      <label class="text-xs font-bold uppercase tracking-widest text-gray-500">{{stat.label}}</label>
      <input class="input w-14 text-center text-lg"
             type="number" name="system.{{stat.key}}" value="{{stat.value}}" />
    </div>
    {{/each}}
  </section>

</div>
